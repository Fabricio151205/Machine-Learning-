<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Producto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>
<body>

    <div class="container mt-4">

        <h1>Agregar Producto</h1>

        <form method="POST">

            <div class="mb-3">
                <label>Nombre</label>
                <input
                    type="text"
                    name="nombre"
                    class="form-control"
                    required>
            </div>

            <div class="mb-3">
                <label>Descripción</label>
                <textarea
                    name="descripcion"
                    class="form-control"
                    rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label>Categoría</label>

                <select
                    name="categoria_id"
                    class="form-control">

                    {% for categoria in categorias %}

                    <option value="{{ categoria[0] }}">
                        {{ categoria[1] }}
                    </option>

                    {% endfor %}

                </select>
            </div>

            <div class="mb-3">
                <label>Proveedor</label>

                <select
                    name="proveedor_id"
                    class="form-control">

                    {% for proveedor in proveedores %}

                    <option value="{{ proveedor[0] }}">
                        {{ proveedor[1] }}
                    </option>

                    {% endfor %}

                </select>
            </div>

            <div class="mb-3">
                <label>Precio</label>
                <input
                    type="number"
                    step="0.01"
                    name="precio"
                    class="form-control"
                    required>
            </div>

            <div class="mb-3">
                <label>Stock</label>
                <input
                    type="number"
                    name="stock"
                    class="form-control"
                    required>
            </div>

            <button class="btn btn-primary">
                Guardar
            </button>
            <a href="/" class="btn btn-secondary">
                Volver
            </a>

        </form>

    </div>

</body>
</html>
