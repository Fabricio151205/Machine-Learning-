<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Proveedor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Editar Proveedor</h2>

    <form method="POST">

        <div class="mb-3">
            <label>Nombre</label>
            <input
                type="text"
                name="nombre"
                class="form-control"
                value="{{ proveedor[1] }}"
                required>
        </div>

        <div class="mb-3">
            <label>Teléfono</label>
            <input
                type="text"
                name="telefono"
                class="form-control"
                value="{{ proveedor[2] }}">
        </div>

        <div class="mb-3">
            <label>Correo</label>
            <input
                type="email"
                name="correo"
                class="form-control"
                value="{{ proveedor[3] }}">
        </div>

        <div class="mb-3">
            <label>Dirección</label>
            <input
                type="text"
                name="direccion"
                class="form-control"
                value="{{ proveedor[4] }}">
        </div>

        <button type="submit" class="btn btn-primary">
            Guardar Cambios
        </button>

        <a href="/proveedores" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

</body>
</html>
