<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Categoría</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>
<body>

<div class="container mt-5">

    <h2>Editar Categoría</h2>

    <form method="POST">

        <div class="mb-3">
            <label>Nombre</label>
            <input
                type="text"
                name="nombre"
                class="form-control"
                value="{{ categoria[1] }}"
                required>
        </div>

        <div class="mb-3">
            <label>Descripción</label>
            <textarea
                name="descripcion"
                class="form-control"
                rows="3">{{ categoria[2] }}</textarea>
        </div>

        <button type="submit" class="btn btn-primary">
            Guardar Cambios
        </button>

        <a href="/categorias" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

</body>
</html>
