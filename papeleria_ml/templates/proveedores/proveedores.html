<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proveedores</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Proveedores</h2>

    <div class="mb-3">

        <a href="/" class="btn btn-secondary">
            Volver
        </a>

        <a href="/agregar_proveedor" class="btn btn-success">
            Nuevo Proveedor
        </a>

    </div>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>Correo</th>
                <th>Dirección</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>

            {% for proveedor in proveedores %}
            <tr>
                <td>{{ proveedor[0] }}</td>
                <td>{{ proveedor[1] }}</td>
                <td>{{ proveedor[2] }}</td>
                <td>{{ proveedor[3] }}</td>
                <td>{{ proveedor[4] }}</td>

                <td>

                    <a href="/editar_proveedor/{{ proveedor[0] }}"
                    class="btn btn-warning btn-sm">
                    Editar
                    </a>

                    <a href="/eliminar_proveedor/{{ proveedor[0] }}"
                    class="btn btn-danger btn-sm"
                    onclick="return confirm('¿Seguro que deseas eliminar este proveedor?')">
                    Eliminar
                    </a>

                </td>

            </tr>
            {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
