<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Entrada de Inventario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Entrada de Inventario</h2>

    <div class="mb-3">
        <a href="/" class="btn btn-secondary">
            Volver
        </a>
    </div>

    <form method="POST">

        <div class="mb-3">

            <label>Producto</label>

            <select name="producto_id"
                    class="form-control"
                    required>

                {% for producto in productos %}

                <option value="{{ producto[0] }}">
                    {{ producto[1] }} - Stock: {{ producto[4] }}
                </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-3">

            <label>Cantidad a ingresar</label>

            <input
                type="number"
                name="cantidad"
                min="1"
                class="form-control"
                required>

        </div>

        <button type="submit"
                class="btn btn-success">

            Registrar Entrada

        </button>

    </form>

</div>

</body>
</html>
