<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5">

    <h2>Predicción de Demanda con IA</h2>

    <form method="POST">

        <div class="mb-3">

            <label>Producto</label>

            <select name="producto_id" class="form-control">

                {% for producto in productos %}

                <option value="{{ producto[0] }}">
                    {{ producto[1] }}
                </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-3">

            <label>Año</label>

            <input
                type="number"
                name="anio"
                class="form-control"
                value="2027">

        </div>

        <div class="mb-3">

            <label>Mes</label>

            <input
                type="number"
                name="mes"
                min="1"
                max="12"
                class="form-control">

        </div>

        <button
            type="submit"
            class="btn btn-primary">

            Predecir

        </button>

    </form>

    {% if resultado %}

    <div class="alert alert-success mt-4">

        <h4>
            Demanda estimada:
            {{ resultado|round|int }}
            unidades
        </h4>

    </div>

    {% endif %}

</div>
