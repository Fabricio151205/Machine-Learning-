<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Producto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Editar Producto</h2>

    <form method="POST">

        <div class="mb-3">
            <label>Nombre</label>
            <input
                type="text"
                name="nombre"
                class="form-control"
                value="{{ producto[1] }}"
                required>
        </div>

        <div class="mb-3">
            <label>Precio</label>
            <input
                type="number"
                step="0.01"
                name="precio"
                class="form-control"
                value="{{ producto[3] }}"
                required>
        </div>

        <div class="mb-3">
            <label>Stock</label>
            <input
                type="number"
                name="stock"
                class="form-control"
                value="{{ producto[4] }}"
                required>
        </div>

        <button type="submit" class="btn btn-primary">
            Guardar Cambios
        </button>

        <a href="/" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

</body>
</html>
